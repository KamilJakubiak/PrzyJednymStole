<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dodaj lokalizację</title>
  <link rel="icon" type="image/svg+xml" href="../assets/faviconF.svg">
  <link rel="icon" href="../assets/faviconF.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../site/css/buttons.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>

<header class="page-header">
  <img src="../assets/Asset 12.svg" class="page-logo" alt="#PrzyJednymStole">
</header>

<div class="layout">

  <!-- Form -->
  <div class="card card-form">

    <!-- Coords (single field, Google Maps paste) -->
    <div class="field">
      <label>Współrzędne</label>
      <input type="text" id="f-coords" placeholder="51.111982177449626, 17.027831252433042" autocomplete="off">
      <span class="hint">Google Maps → kliknij prawym na mapie → skopiuj współrzędne</span>
    </div>

    <!-- Title -->
    <div class="field">
      <label>Nazwa miejsca</label>
      <input type="text" id="f-title" placeholder="np. Panda Ramen">
    </div>

    <!-- Cuisine -->
    <div class="field">
      <label>Kuchnia / kolor markera</label>
      <div class="cuisine-select-wrap">
        <span class="cuisine-swatch" id="cuisine-swatch"></span>
        <select id="f-cuisine">
          <option value="EU">Europejska</option>
          <option value="EA">Azjatycka</option>
          <option value="IN">Indyjska</option>
          <option value="LA">Latynoska</option>
          <option value="ME">Arabska</option>
          <option value="AF">Afrykańska</option>
        </select>
      </div>
    </div>

    <!-- District (auto-detected, then overridable) -->
    <div class="field">
      <label>Dzielnica</label>
      <select id="district-display" disabled>
        <option value="" disabled selected hidden>Proponowana automatycznie</option>
        <option value="stare_miasto">Stare Miasto</option>
        <option value="srodmiescie">Śródmieście</option>
        <option value="krzyki">Krzyki</option>
        <option value="fabryczna">Fabryczna</option>
        <option value="psie_pole">Psie Pole</option>
      </select>
    </div>

    <!-- Labels / tags -->
    <div class="field">
      <label>Etykiety</label>
      <div class="tags-wrap" id="tags-wrap">
        <input class="tags-input" id="tags-input" placeholder="Wpisz i naciśnij Enter…">
      </div>
      <span class="hint" id="tags-budget-hint">Maks. 3 tagi · łącznie do 16 znaków · Enter zatwierdza</span>
    </div>

    <!-- Description -->
    <div class="field">
      <label>Opis</label>
      <textarea id="f-details" maxlength="90" placeholder="Krótki opis miejsca…"></textarea>
      <span class="char-counter" id="char-counter">0 / 90</span>
    </div>

    <!-- Image -->
    <div class="field">
      <label>Zdjęcie</label>
      <label class="upload-label" for="f-image-file">
        <svg viewBox="0 0 16 16" fill="none" width="13" height="13" aria-hidden="true">
          <path d="M8 11V3M5 6l3-3 3 3M3 13h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Prześlij
      </label>
      <input type="file" id="f-image-file" accept="image/*" style="display:none" tabindex="-1">
    </div>

    <input type="hidden" id="f-image">

    <div class="divider"></div>

    <button class="bar-btn bar-btn-wide" id="add-btn">
      <svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Dodaj do listy
    </button>

  </div>

  <!-- Queue + Preview -->
  <div class="card card-queue">

    <!-- Live popup preview -->
    <div class="preview-section">
      <span class="queue-title">Podgląd</span>
      <div class="preview-card" id="preview-card">
        <div class="preview-img-wrap">
          <img id="preview-img" class="preview-img-el" src="" alt="" style="display:none">
          <div class="preview-img-ph" id="preview-img-ph"></div>
        </div>
        <div class="preview-body">
          <div class="preview-title" id="preview-title">Nazwa miejsca</div>
          <div class="preview-labels" id="preview-labels"></div>
          <p class="preview-details" id="preview-details"></p>
          <a id="preview-nav" class="preview-nav" target="_blank" rel="noopener">
            Nawiguj
            <svg class="preview-nav-arrow" viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <span class="queue-title" style="display:block;margin-bottom:5px">Tryb</span>
      <div class="mode-switch">
        <button class="mode-btn mode-btn--active" id="mode-add">
          <svg viewBox="0 0 16 16" fill="none" width="11" height="11" aria-hidden="true"><path d="M4 2h6l3 3v9H4V2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Wpis
        </button>
        <button class="mode-btn" id="mode-edit">
          <svg viewBox="0 0 16 16" fill="none" width="11" height="11" aria-hidden="true"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Edycja
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <button class="bar-btn bar-btn-wide bar-btn-rainbow bar-btn-disabled" id="download-btn">
      <svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
        <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Pobierz plik
    </button>

    <div class="divider"></div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span class="queue-title">Dodane lokacje</span>
        <span class="queue-count" id="queue-count">0 wpisów</span>
      </div>
      <div id="queue-list">
        <div id="queue-empty" style="display:none"></div>
      </div>
    </div>


  </div>

</div>

<p class="page-footer">© Kamil Jakubiak</p>

<div class="toast" id="toast"></div>

<script src="../site/js/nbspify.js"></script>
<script>

const CUISINE_COLORS = { EU: '#09b8e3', EA: '#e30615', IN: '#ff931e', LA: '#30a533', ME: '#fdcd14', AF: '#ab539a' };

const TAGS_BUDGET = 16; // total chars across all tags combined

function updateTagsBudget() {
  const hint = document.getElementById('tags-budget-hint');
  if (!hint) return;
  if (tags.length >= 3) {
    hint.textContent = 'Osiągnięto limit 3 tagów';
    return;
  }
  const used = tags.reduce((s, t) => s + t.length, 0);
  const rem  = TAGS_BUDGET - used;
  if (tags.length === 0) {
    hint.textContent = 'Maks. 3 tagi · łącznie do ' + TAGS_BUDGET + ' znaków · Enter zatwierdza';
  } else {
    hint.textContent = 'Pozostało ' + Math.max(0, rem) + ' znaków';
  }
}
const MARKER_TEXT   = { '#fdcd14': '#1e2448', '#ff931e': '#1e2448', '#09b8e3': '#1e2448', '#30a533': '#fdcd14', '#e30615': '#fdcd14', '#ab539a': '#fdcd14' };
const SECTION_LABELS = { stare_miasto: 'Stare Miasto', srodmiescie: 'Śródmieście', krzyki: 'Krzyki', fabryczna: 'Fabryczna', psie_pole: 'Psie Pole' };

const cuisineSelect = document.getElementById('f-cuisine');
const cuisineSwatch = document.getElementById('cuisine-swatch');
function updateSwatch() { cuisineSwatch.style.background = CUISINE_COLORS[cuisineSelect.value] || ''; }
cuisineSelect.addEventListener('change', () => { updateSwatch(); updatePreview(); });
updateSwatch();

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/javascript;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// -- Parse "lat, lng" string → [lat, lng] or null --
function parseCoords(raw) {
  const parts = raw.trim().split(/[\s,]+/);
  if (parts.length < 2) return null;
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (lat < 49 || lat > 55 || lng < 14 || lng > 24) return null; // sanity check: Poland bounds
  return [lat, lng];
}

// -- Auto-detect Wrocław district from coordinates --
function detectDistrict(lat, lng) {
  if (lng < 17.010 && lat < 51.120) return 'fabryczna';
  if (lat >= 51.118)                return 'psie_pole';
  if (lat >= 51.090)                return 'stare_miasto';
  if (lat >= 51.058)                return 'srodmiescie';
  return 'krzyki';
}

// -- Live coords → district display + nav preview --
const coordsInput     = document.getElementById('f-coords');
const districtDisplay = document.getElementById('district-display');
const titleInput      = document.getElementById('f-title');
const imageInput      = document.getElementById('f-image');
const imgFileInput    = document.getElementById('f-image-file');

coordsInput.addEventListener('input', () => {
  const coords = parseCoords(coordsInput.value);
  if (coords) {
    const [lat, lng] = coords;
    districtDisplay.value    = detectDistrict(lat, lng);
    districtDisplay.disabled = false;
  } else {
    districtDisplay.value    = '';
    districtDisplay.disabled = true;
  }
  updatePreview();
});

// -- Image: file upload → resize → preview card --
function setImage(src) {
  imageInput.value = src;
  updatePreview();
}

imgFileInput.addEventListener('change', () => {
  const file = imgFileInput.files[0];
  if (!file) return;
  const objUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const MAX_W = 600, MAX_H = 400;
    let w = img.width, h = img.height;
    const ratio = Math.min(MAX_W / w, MAX_H / h, 1);
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(objUrl);
    setImage(canvas.toDataURL('image/jpeg', 0.72));
  };
  img.src = objUrl;
});

// -- Live popup card preview --
function updatePreview() {
  const card      = document.getElementById('preview-card');
  const src       = imageInput.value;
  const titleText = titleInput.value.trim();
  const detText   = detailsEl.value.trim();

  // Apply cuisine card colors (matches map.js openPopup logic)
  const cardColor = CUISINE_COLORS[cuisineSelect.value] || '#ffffff';
  const cardText  = MARKER_TEXT[cardColor] || '#1e2448';
  const r = parseInt(cardColor.slice(1, 3), 16);
  const g = parseInt(cardColor.slice(3, 5), 16);
  const b = parseInt(cardColor.slice(5, 7), 16);
  card.style.setProperty('--card-color',     cardColor);
  card.style.setProperty('--card-color-rgb', `${r},${g},${b}`);
  card.style.setProperty('--card-text',      cardText);

  // Image / placeholder
  const imgEl = document.getElementById('preview-img');
  const phEl  = document.getElementById('preview-img-ph');
  if (src) {
    imgEl.src = src;
    imgEl.style.display = '';
    phEl.style.display  = 'none';
  } else {
    imgEl.src = '';
    imgEl.style.display = 'none';
    phEl.style.display  = '';
  }

  // Title
  const titleEl = document.getElementById('preview-title');
  titleEl.textContent   = titleText ? nbspify(titleText) : 'Nazwa miejsca';
  titleEl.style.opacity = titleText ? '1' : '0.45';

  // Description
  const detEl = document.getElementById('preview-details');
  detEl.textContent   = detText ? nbspify(detText) : 'Krótki opis miejsca…';
  detEl.style.opacity = detText ? '1' : '0.4';

  // Labels — real tags or placeholder chips
  const labelsEl = document.getElementById('preview-labels');
  labelsEl.innerHTML = '';
  updateTagsBudget();
  if (tags.length > 0) {
    tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'preview-label';
      chip.textContent = t;
      labelsEl.appendChild(chip);
    });
  } else {
    ['Tag 1', 'Tag 2'].forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'preview-label preview-label-ph';
      chip.textContent = t;
      labelsEl.appendChild(chip);
    });
  }

  // Nawiguj link — active only when coords are valid
  const navEl  = document.getElementById('preview-nav');
  const coords = parseCoords(coordsInput.value);
  if (coords) {
    navEl.href = 'https://www.google.com/maps/dir/?api=1&destination=' + coords[0] + ',' + coords[1];
    navEl.classList.add('active');
  } else {
    navEl.removeAttribute('href');
    navEl.classList.remove('active');
  }
}

// -- Opis character counter --
const detailsEl = document.getElementById('f-details');
const counterEl = document.getElementById('char-counter');

detailsEl.addEventListener('input', () => {
  const len = detailsEl.value.length;
  counterEl.textContent = len + ' / 90';
  counterEl.className = 'char-counter' + (len >= 90 ? ' at-limit' : len >= 75 ? ' near-limit' : '');
  updatePreview();
});

titleInput.addEventListener('input', updatePreview);

// -- New entries added this session --
const newEntries = [];
let editingIndex = null;
let mode = 'add';

document.getElementById('mode-add').addEventListener('click', () => {
  if (mode === 'add') return;
  mode = 'add';
  document.getElementById('mode-add').classList.add('mode-btn--active');
  document.getElementById('mode-edit').classList.remove('mode-btn--active');
  editingIndex = null;
  resetForm();
  renderQueue();
});

document.getElementById('mode-edit').addEventListener('click', () => {
  if (mode === 'edit') return;
  mode = 'edit';
  document.getElementById('mode-edit').classList.add('mode-btn--active');
  document.getElementById('mode-add').classList.remove('mode-btn--active');
  editingIndex = null;
  resetForm();
  renderQueue();
  if (newEntries.length > 0) loadEntryForEdit(0);
});

// -- Tags --
const tags      = [];
const tagsInput = document.getElementById('tags-input');
const tagsWrap  = document.getElementById('tags-wrap');

tagsWrap.addEventListener('click', () => tagsInput.focus());

tagsInput.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ',') && tagsInput.value.trim()) {
    e.preventDefault();
    addTag(tagsInput.value.trim().replace(/,$/, ''));
    tagsInput.value = '';
  }
  if (e.key === 'Backspace' && tagsInput.value === '' && tags.length) {
    removeTag(tags.length - 1);
  }
});

tagsInput.addEventListener('input', () => {
  if (tagsInput.value.endsWith(',') && tagsInput.value.trim().length > 1) {
    addTag(tagsInput.value.replace(/,$/, '').trim());
    tagsInput.value = '';
  }
});

function addTag(text) {
  if (!text || tags.includes(text)) return;
  if (tags.length >= 3) { showToast('Maks. 3 tagi', true); return; }
  const used = tags.reduce((s, t) => s + t.length, 0);
  if (used + text.length > TAGS_BUDGET) {
    showToast('Tag za długi – pozostało ' + Math.max(0, TAGS_BUDGET - used) + ' znaków', true);
    return;
  }
  tags.push(text);
  const chip = document.createElement('span');
  chip.className = 'tag';
  chip.innerHTML = `${escHtml(text)}<button class="tag-remove" type="button" aria-label="Usuń">×</button>`;
  chip.querySelector('.tag-remove').addEventListener('click', () => {
    const idx = tags.indexOf(text);
    if (idx !== -1) removeTag(idx);
  });
  tagsWrap.insertBefore(chip, tagsInput);
  updatePreview();
}

function removeTag(idx) {
  tags.splice(idx, 1);
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  const copy = [...tags];
  tags.length = 0;
  copy.forEach(t => addTag(t));
  updatePreview();
}

// -- Add to queue --
document.getElementById('add-btn').addEventListener('click', () => {
  const title  = document.getElementById('f-title').value.trim();
  const coords = parseCoords(coordsInput.value);

  if (!title)  { showToast('Podaj nazwę miejsca', true); return; }
  if (!coords) { showToast('Podaj poprawne współrzędne', true); return; }

  const [lat, lng] = coords;
  const section    = districtDisplay.value;
  if (!section) { showToast('Wybierz dzielnicę', true); return; }

  const image = document.getElementById('f-image').value.trim();
  if (!image) { showToast('Dodaj zdjęcie miejsca', true); return; }
  const nav   = 'https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lng;

  const entry = {
    title,
    coords: [lat, lng],
    section,
    cuisine: document.getElementById('f-cuisine').value,
    image,
    details: detailsEl.value.trim(),
    labels: [...tags],
    nav,
  };

  if (editingIndex !== null) {
    newEntries[editingIndex] = entry;
    showToast('Zaktualizowano: ' + title, false, true);
  } else if (mode === 'edit') {
    showToast('Wybierz wpis z listy', true);
    return;
  } else {
    newEntries.push(entry);
    showToast('Dodano: ' + title);
  }
  renderQueue();
  resetForm();
});

function loadEntryForEdit(i) {
  if (editingIndex === i) return;
  const e = newEntries[i];
  editingIndex = i;

  document.getElementById('f-title').value = e.title;
  coordsInput.value = e.coords[0] + ', ' + e.coords[1];
  districtDisplay.value    = e.section;
  districtDisplay.disabled = false;
  document.getElementById('f-cuisine').value = e.cuisine;
  detailsEl.value = e.details;
  const len = e.details.length;
  counterEl.textContent = len + ' / 90';
  counterEl.className = 'char-counter' + (len >= 90 ? ' at-limit' : len >= 75 ? ' near-limit' : '');

  tags.length = 0;
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  e.labels.forEach(t => addTag(t));

  setImage(e.image);
  updateSwatch();
  updatePreview();
  renderQueue();
  const addBtn = document.getElementById('add-btn');
  addBtn.classList.remove('bar-btn-disabled');
  addBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true" style="vertical-align:-2px"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Zaktualizuj';
}

function renderQueue() {
  const list  = document.getElementById('queue-list');
  const empty = document.getElementById('queue-empty');
  const n = newEntries.length;
  const label = n === 1 ? 'wpis' : n < 5 ? 'wpisy' : 'wpisów';
  document.getElementById('queue-count').textContent = n < 5 ? n + ' ' + label + ' (min. 5)' : n + ' ' + label;
  document.getElementById('download-btn').classList.toggle('bar-btn-disabled', n < 5);

  list.querySelectorAll('.queue-item').forEach(el => el.remove());

  newEntries.forEach((e, i) => {
    const item = document.createElement('div');
    const selectable = mode === 'edit';
    item.className = 'queue-item'
      + (i === editingIndex ? ' queue-item--editing' : '')
      + (selectable ? ' queue-item--selectable' : '');
    item.innerHTML = `
      <span class="queue-dot" style="background:${CUISINE_COLORS[e.cuisine]}"></span>
      <div class="queue-name">${escHtml(e.title)}</div>
      <button class="queue-remove" aria-label="Usuń">×</button>
    `;
    if (selectable) {
      item.addEventListener('click', ev => {
        if (ev.target.closest('.queue-remove')) return;
        loadEntryForEdit(i);
      });
    }
    item.querySelector('.queue-remove').addEventListener('click', () => {
      if (editingIndex === i) { editingIndex = null; resetForm(); }
      else if (editingIndex !== null && editingIndex > i) { editingIndex--; }
      newEntries.splice(i, 1);
      renderQueue();
    });
    list.appendChild(item);
  });
}

// -- Download submission file --
document.getElementById('download-btn').addEventListener('click', () => {
  if (newEntries.length < 5) { showToast('Wymagane minimum 5 wpisów (masz ' + newEntries.length + ')', true); return; }

  const date     = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const rand     = Math.random().toString(36).slice(2, 6);
  const filename = 'form-data-' + date + '-' + rand + '.js';
  const now      = new Date().toISOString().slice(0, 10);
  const count    = newEntries.length;

  let out = '// ' + filename + '\n';
  out += '// ' + count + ' lokalizacj' + (count === 1 ? 'a' : count < 5 ? 'e' : 'i') + ' · ' + now + '\n\n';
  newEntries.forEach(e => {
    const labStr = e.labels.map(l => '\'' + l.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\'').join(', ');
    out += 'upsertLocation({\n';
    out += '  title:   \'' + e.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'")   + '\',\n';
    out += '  coords:  [' + e.coords[0] + ', ' + e.coords[1] + '],\n';
    out += '  section: \'' + e.section   + '\',\n';
    out += '  cuisine: \'' + e.cuisine   + '\',\n';
    out += '  image:   \'' + e.image.replace(/\\/g,'\\\\').replace(/'/g,"\\'")   + '\',\n';
    out += '  details: \'' + e.details.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',\n';
    out += '  labels:  [' + labStr + '],\n';
    if (e.nav) out += '  nav:     \'' + e.nav.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',\n';
    out += '});\n\n';
  });

  downloadFile(filename, out);

  showToast('Pobrano ' + filename, false, true);
});

// -- Reset form --
function resetForm() {
  editingIndex = null;
  const addBtn = document.getElementById('add-btn');
  if (mode === 'edit') {
    addBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true" style="vertical-align:-2px"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Zaktualizuj';
    addBtn.classList.add('bar-btn-disabled');
  } else {
    addBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true" style="vertical-align:-2px"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Dodaj do listy';
    addBtn.classList.remove('bar-btn-disabled');
  }
  document.getElementById('f-title').value = '';
  coordsInput.value = '';
  districtDisplay.value    = '';
  districtDisplay.disabled = true;
  detailsEl.value = '';
  counterEl.textContent = '0 / 90';
  counterEl.className = 'char-counter';
  imgFileInput.value = '';
  setImage('');
  tags.length = 0;
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  document.getElementById('f-cuisine').value = 'EU';
  updateSwatch();
  updatePreview();
}

// -- Toast --
function showToast(msg, isErr = false, isOk = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : isOk ? ' ok' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderQueue();
updatePreview();
</script>
