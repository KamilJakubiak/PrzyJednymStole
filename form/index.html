<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularz Zgłoszeniowy</title>
  <link rel="icon" type="image/svg+xml" href="../assets/faviconF.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>

<header class="page-header">
  <img src="../assets/Asset 12.svg" class="page-logo" alt="#PrzyJednymStole">
</header>

<div class="layout">

  <!-- Form -->
  <div class="card card-form">

    <div class="field">
      <label>Współrzędne</label>
      <input type="text" id="f-coords" placeholder="51.111982177449626, 17.027831252433042" autocomplete="off">
      <span class="hint">Google Maps → kliknij prawym na mapie → skopiuj współrzędne</span>
    </div>

    <div class="field">
      <label>Nazwa miejsca</label>
      <input type="text" id="f-title" placeholder="np. Panda Ramen">
    </div>

    <div class="field">
      <label>Kuchnia / kolor markera</label>
      <div class="cuisine-select-wrap">
        <span class="cuisine-swatch" id="cuisine-swatch"></span>
        <select id="f-cuisine">
          <option value="EU">Europejska</option>
          <option value="EA">Azjatycka</option>
          <option value="IN">Indyjska</option>
          <option value="LA">Latynoska</option>
          <option value="ME">Arabska</option>
          <option value="AF">Afrykańska</option>
        </select>
      </div>
    </div>

    <!-- Auto-detected from coords, manually overridable -->
    <div class="field">
      <label>Dzielnica</label>
      <select id="district-display" disabled>
        <option value="" disabled selected hidden>Proponowana automatycznie</option>
        <option value="stare_miasto">Stare Miasto</option>
        <option value="srodmiescie">Śródmieście</option>
        <option value="krzyki">Krzyki</option>
        <option value="fabryczna">Fabryczna</option>
        <option value="psie_pole">Psie Pole</option>
      </select>
    </div>

    <div class="field">
      <label>Etykiety</label>
      <div class="tags-wrap" id="tags-wrap">
        <input class="tags-input" id="tags-input" placeholder="Wpisz i naciśnij Enter…">
      </div>
      <span class="hint" id="tags-budget-hint">Maks. 2 tagi · łącznie do 16 znaków · Enter zatwierdza</span>
    </div>

    <div class="field">
      <label>Opis</label>
      <textarea id="f-details" maxlength="120" placeholder="Krótki opis miejsca…"></textarea>
      <span class="char-counter" id="char-counter">0 / 120</span>
    </div>

    <div class="field">
      <label>Zdjęcie</label>
      <label class="upload-label" for="f-image-file">
        <svg viewBox="0 0 16 16" fill="none" width="13" height="13" aria-hidden="true">
          <path d="M8 11V3M5 6l3-3 3 3M3 13h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Prześlij
      </label>
      <input type="file" id="f-image-file" accept="image/*" style="display:none" tabindex="-1">
    </div>

    <input type="hidden" id="f-image">

    <div class="divider"></div>

    <button class="bar-btn bar-btn-wide" id="add-btn">
      <svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Dodaj do listy
    </button>

  </div>

  <!-- Queue + Preview -->
  <div class="card card-queue">

    <div class="preview-section">
      <span class="queue-title">Podgląd</span>
      <div class="preview-card" id="preview-card">
        <div class="preview-img-wrap">
          <img id="preview-img" class="preview-img-el" src="" alt="" style="display:none">
          <div class="preview-img-ph" id="preview-img-ph"></div>
        </div>
        <div class="preview-body">
          <div class="preview-title" id="preview-title">Nazwa miejsca</div>
          <div class="preview-labels" id="preview-labels"></div>
          <p class="preview-details" id="preview-details"></p>
          <a id="preview-nav" class="preview-nav" target="_blank" rel="noopener">
            Nawiguj
            <svg class="preview-nav-arrow" viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <span class="queue-title" style="display:block;margin-bottom:5px">Tryb</span>
      <div class="mode-switch">
        <button class="mode-btn mode-btn--active" id="mode-add">
          <svg viewBox="0 0 16 16" fill="none" width="11" height="11" aria-hidden="true"><path d="M4 2h6l3 3v9H4V2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Wpis
        </button>
        <button class="mode-btn" id="mode-edit">
          <svg viewBox="0 0 16 16" fill="none" width="11" height="11" aria-hidden="true"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Edycja
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <button class="bar-btn bar-btn-wide bar-btn-rainbow bar-btn-disabled" id="download-btn">
      <svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true">
        <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Pobierz plik
    </button>

    <div class="divider"></div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span class="queue-title">Dodane lokacje</span>
        <span class="queue-count" id="queue-count">0 wpisów</span>
      </div>
      <div id="queue-list"></div>
    </div>

  </div>

</div>

<p class="page-footer">© Kamil Jakubiak</p>
<div class="toast" id="toast"></div>

<script src="../assets/nbspify.js"></script>
<script>

// -- Config --
const CUISINE_COLORS = { EU:'#09b8e3', EA:'#e30615', IN:'#ff931e', LA:'#30a533', ME:'#fdcd14', AF:'#ab539a' };
const MARKER_TEXT    = { '#fdcd14':'#1e2448', '#ff931e':'#1e2448', '#09b8e3':'#1e2448', '#30a533':'#fdcd14', '#e30615':'#fdcd14', '#ab539a':'#fdcd14' };
const TAGS_MAX    = 2;
const TAGS_BUDGET = 16;
const DETAIL_MAX  = 120;
const DETAIL_WARN = 100;

// Button label SVGs (reused when switching modes)
const SVG_PLUS = '<svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true" style="vertical-align:-2px"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
const SVG_PEN  = '<svg viewBox="0 0 16 16" fill="none" width="14" height="14" aria-hidden="true" style="vertical-align:-2px"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

// -- DOM refs --
const coordsInput     = document.getElementById('f-coords');
const titleInput      = document.getElementById('f-title');
const cuisineSelect   = document.getElementById('f-cuisine');
const cuisineSwatch   = document.getElementById('cuisine-swatch');
const districtDisplay = document.getElementById('district-display');
const detailsEl       = document.getElementById('f-details');
const counterEl       = document.getElementById('char-counter');
const imageInput      = document.getElementById('f-image');
const imgFileInput    = document.getElementById('f-image-file');
const tagsInput       = document.getElementById('tags-input');
const tagsWrap        = document.getElementById('tags-wrap');
const tagsBudgetHint  = document.getElementById('tags-budget-hint');
const addBtn          = document.getElementById('add-btn');
const modeAddBtn      = document.getElementById('mode-add');
const modeEditBtn     = document.getElementById('mode-edit');
const downloadBtn     = document.getElementById('download-btn');
const queueList       = document.getElementById('queue-list');
const queueCount      = document.getElementById('queue-count');
const previewCard     = document.getElementById('preview-card');
const previewImg      = document.getElementById('preview-img');
const previewImgPh    = document.getElementById('preview-img-ph');
const previewTitle    = document.getElementById('preview-title');
const previewDetails  = document.getElementById('preview-details');
const previewNav      = document.getElementById('preview-nav');
const previewLabels   = document.getElementById('preview-labels');
const toast           = document.getElementById('toast');

// -- State --
const newEntries = [];
const tags = [];
let editingIndex = null;
let mode = 'add';

// -- Utilities --

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isErr = false, isOk = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isErr ? ' err' : isOk ? ' ok' : '');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// Parse "lat, lng" string → [lat, lng] or null
function parseCoords(raw) {
  const parts = raw.trim().split(/[\s,]+/);
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (lat < 49 || lat > 55 || lng < 14 || lng > 24) return null; // Poland bounds
  return [lat, lng];
}

// Rough Wrocław district from coords
function detectDistrict(lat, lng) {
  if (lng < 17.010 && lat < 51.120) return 'fabryczna';
  if (lat >= 51.118)                return 'psie_pole';
  if (lat >= 51.090)                return 'stare_miasto';
  if (lat >= 51.058)                return 'srodmiescie';
  return 'krzyki';
}

function setCounter(len) {
  counterEl.textContent = len + ' / ' + DETAIL_MAX;
  counterEl.className = 'char-counter' + (len >= DETAIL_MAX ? ' at-limit' : len >= DETAIL_WARN ? ' near-limit' : '');
}

function downloadFile(filename, content) {
  const url = URL.createObjectURL(new Blob([content], { type: 'text/javascript;charset=utf-8' }));
  Object.assign(document.createElement('a'), { href: url, download: filename }).click();
  URL.revokeObjectURL(url);
}

// -- Cuisine swatch --
function updateSwatch() { cuisineSwatch.style.background = CUISINE_COLORS[cuisineSelect.value] || ''; }
cuisineSelect.addEventListener('change', () => { updateSwatch(); updatePreview(); });
updateSwatch();

// -- Tags --

function updateTagsBudget() {
  if (tags.length >= TAGS_MAX) {
    tagsBudgetHint.textContent = 'Osiągnięto limit ' + TAGS_MAX + ' tagów';
    return;
  }
  const used = tags.reduce((s, t) => s + t.length, 0);
  tagsBudgetHint.textContent = tags.length === 0
    ? 'Maks. ' + TAGS_MAX + ' tagi · łącznie do ' + TAGS_BUDGET + ' znaków · Enter zatwierdza'
    : 'Pozostało ' + Math.max(0, TAGS_BUDGET - used) + ' znaków';
}

function addTag(text) {
  if (!text || tags.includes(text)) return;
  if (tags.length >= TAGS_MAX) { showToast('Maks. ' + TAGS_MAX + ' tagi', true); return; }
  const used = tags.reduce((s, t) => s + t.length, 0);
  if (used + text.length > TAGS_BUDGET) {
    showToast('Tag za długi – pozostało ' + Math.max(0, TAGS_BUDGET - used) + ' znaków', true);
    return;
  }
  tags.push(text);
  const chip = document.createElement('span');
  chip.className = 'tag';
  chip.innerHTML = `${escHtml(text)}<button class="tag-remove" type="button" aria-label="Usuń">×</button>`;
  chip.querySelector('.tag-remove').addEventListener('click', () => {
    const idx = tags.indexOf(text);
    if (idx !== -1) removeTag(idx);
  });
  tagsWrap.insertBefore(chip, tagsInput);
  updatePreview();
}

function removeTag(idx) {
  tags.splice(idx, 1);
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  const copy = [...tags];
  tags.length = 0;
  copy.forEach(t => addTag(t));
  updatePreview();
}

tagsWrap.addEventListener('click', () => tagsInput.focus());

tagsInput.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ',') && tagsInput.value.trim()) {
    e.preventDefault();
    addTag(tagsInput.value.trim().replace(/,$/, ''));
    tagsInput.value = '';
  }
  if (e.key === 'Backspace' && tagsInput.value === '' && tags.length) removeTag(tags.length - 1);
});

tagsInput.addEventListener('input', () => {
  if (tagsInput.value.endsWith(',') && tagsInput.value.trim().length > 1) {
    addTag(tagsInput.value.replace(/,$/, '').trim());
    tagsInput.value = '';
  }
});

// -- Image: file → resize → base64 --

function setImage(src) {
  imageInput.value = src;
  updatePreview();
}

imgFileInput.addEventListener('change', () => {
  const file = imgFileInput.files[0];
  if (!file) return;
  const objUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const MAX_W = 600, MAX_H = 400;
    const ratio = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
    const w = Math.round(img.width * ratio);
    const h = Math.round(img.height * ratio);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(objUrl);
    setImage(canvas.toDataURL('image/jpeg', 0.72));
  };
  img.src = objUrl;
});

// -- Coords → district auto-detect --

coordsInput.addEventListener('input', () => {
  const coords = parseCoords(coordsInput.value);
  if (coords) {
    districtDisplay.value    = detectDistrict(coords[0], coords[1]);
    districtDisplay.disabled = false;
  } else {
    districtDisplay.value    = '';
    districtDisplay.disabled = true;
  }
  updatePreview();
});

// -- Live popup preview --

function updatePreview() {
  const src       = imageInput.value;
  const titleText = titleInput.value.trim();
  const detText   = detailsEl.value.trim();
  const cardColor = CUISINE_COLORS[cuisineSelect.value] || '#ffffff';
  const cardText  = MARKER_TEXT[cardColor] || '#1e2448';
  const r = parseInt(cardColor.slice(1, 3), 16);
  const g = parseInt(cardColor.slice(3, 5), 16);
  const b = parseInt(cardColor.slice(5, 7), 16);

  previewCard.style.setProperty('--card-color',     cardColor);
  previewCard.style.setProperty('--card-color-rgb', `${r},${g},${b}`);
  previewCard.style.setProperty('--card-text',      cardText);

  // Image or placeholder
  if (src) {
    previewImg.src            = src;
    previewImg.style.display  = '';
    previewImgPh.style.display = 'none';
  } else {
    previewImg.src            = '';
    previewImg.style.display  = 'none';
    previewImgPh.style.display = '';
  }

  previewTitle.textContent   = titleText ? nbspify(titleText) : 'Nazwa miejsca';
  previewTitle.style.opacity = titleText ? '1' : '0.45';

  previewDetails.textContent   = detText ? nbspify(detText) : 'Krótki opis miejsca…';
  previewDetails.style.opacity = detText ? '1' : '0.4';

  // Real tags or placeholder chips
  previewLabels.innerHTML = '';
  updateTagsBudget();
  const showReal = tags.length > 0;
  (showReal ? tags : ['Tag 1', 'Tag 2']).forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'preview-label' + (showReal ? '' : ' preview-label-ph');
    chip.textContent = t;
    previewLabels.appendChild(chip);
  });

  // Nav link — active only with valid coords
  const coords = parseCoords(coordsInput.value);
  if (coords) {
    previewNav.href = 'https://www.google.com/maps/dir/?api=1&destination=' + coords[0] + ',' + coords[1];
    previewNav.classList.add('active');
  } else {
    previewNav.removeAttribute('href');
    previewNav.classList.remove('active');
  }
}

titleInput.addEventListener('input', updatePreview);
detailsEl.addEventListener('input', () => { setCounter(detailsEl.value.length); updatePreview(); });

// -- Mode switch --

function setMode(newMode) {
  mode = newMode;
  modeAddBtn.classList.toggle('mode-btn--active', mode === 'add');
  modeEditBtn.classList.toggle('mode-btn--active', mode === 'edit');
  editingIndex = null;
  resetForm();
  renderQueue();
  if (mode === 'edit' && newEntries.length > 0) loadEntryForEdit(0);
}

modeAddBtn.addEventListener('click',  () => { if (mode !== 'add')  setMode('add'); });
modeEditBtn.addEventListener('click', () => { if (mode !== 'edit') setMode('edit'); });

// -- Add / update entry --

addBtn.addEventListener('click', () => {
  const title   = titleInput.value.trim();
  const coords  = parseCoords(coordsInput.value);
  const section = districtDisplay.value;
  const image   = imageInput.value.trim();

  if (!title)   { showToast('Podaj nazwę miejsca', true); return; }
  if (!coords)  { showToast('Podaj poprawne współrzędne', true); return; }
  if (!section) { showToast('Wybierz dzielnicę', true); return; }
  if (!image)   { showToast('Dodaj zdjęcie miejsca', true); return; }

  const entry = {
    title,
    coords,
    section,
    cuisine: cuisineSelect.value,
    image,
    details: detailsEl.value.trim(),
    labels:  [...tags],
  };

  if (editingIndex !== null) {
    newEntries[editingIndex] = entry;
    showToast('Zaktualizowano: ' + title, false, true);
  } else if (mode === 'edit') {
    showToast('Wybierz wpis z listy', true);
    return;
  } else {
    newEntries.push(entry);
    showToast('Dodano: ' + title);
  }
  renderQueue();
  resetForm();
});

// -- Load entry into form for editing --

function loadEntryForEdit(i) {
  if (editingIndex === i) return;
  editingIndex = i;
  const e = newEntries[i];

  titleInput.value         = e.title;
  coordsInput.value        = e.coords[0] + ', ' + e.coords[1];
  districtDisplay.value    = e.section;
  districtDisplay.disabled = false;
  cuisineSelect.value      = e.cuisine;
  detailsEl.value          = e.details;
  setCounter(e.details.length);

  tags.length = 0;
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  e.labels.forEach(t => addTag(t));

  setImage(e.image);
  updateSwatch();
  updatePreview();
  renderQueue();

  addBtn.classList.remove('bar-btn-disabled');
  addBtn.innerHTML = SVG_PEN + ' Zaktualizuj';
}

// -- Queue list --

function renderQueue() {
  const n = newEntries.length;
  const label = n === 1 ? 'wpis' : n < 5 ? 'wpisy' : 'wpisów';
  queueCount.textContent = n + ' ' + label;
  downloadBtn.classList.toggle('bar-btn-disabled', n < 1);

  queueList.querySelectorAll('.queue-item').forEach(el => el.remove());

  newEntries.forEach((e, i) => {
    const item = document.createElement('div');
    const selectable = mode === 'edit';
    item.className = 'queue-item'
      + (i === editingIndex ? ' queue-item--editing' : '')
      + (selectable ? ' queue-item--selectable' : '');
    item.innerHTML = `
      <span class="queue-dot" style="background:${CUISINE_COLORS[e.cuisine]}"></span>
      <div class="queue-name">${escHtml(e.title)}</div>
      <button class="queue-remove" aria-label="Usuń">×</button>
    `;
    if (selectable) {
      item.addEventListener('click', ev => {
        if (!ev.target.closest('.queue-remove')) loadEntryForEdit(i);
      });
    }
    item.querySelector('.queue-remove').addEventListener('click', () => {
      if (editingIndex === i)                       { editingIndex = null; resetForm(); }
      else if (editingIndex !== null && editingIndex > i) { editingIndex--; }
      newEntries.splice(i, 1);
      renderQueue();
    });
    queueList.appendChild(item);
  });
}

// -- Download .js submission file --

document.getElementById('download-btn').addEventListener('click', () => {
  const date     = new Date().toISOString().slice(0, 10);
  const rand     = Math.random().toString(36).slice(2, 6);
  const filename = 'form-data-' + date.replace(/-/g, '') + '-' + rand + '.js';
  const count    = newEntries.length;
  const suffix   = count === 1 ? 'a' : count < 5 ? 'e' : 'i';
  const jsEsc    = s => s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

  let out = `// ${filename}\n// ${count} lokalizacj${suffix} · ${date}\n\n`;
  newEntries.forEach(e => {
    const nav  = 'https://www.google.com/maps/dir/?api=1&destination=' + e.coords[0] + ',' + e.coords[1];
    const labs = e.labels.map(l => `'${jsEsc(l)}'`).join(', ');
    out += `upsertLocation({\n`;
    out += `  title:   '${jsEsc(e.title)}',\n`;
    out += `  coords:  [${e.coords[0]}, ${e.coords[1]}],\n`;
    out += `  section: '${e.section}',\n`;
    out += `  cuisine: '${e.cuisine}',\n`;
    out += `  image:   '${jsEsc(e.image)}',\n`;
    out += `  details: '${jsEsc(e.details)}',\n`;
    out += `  labels:  [${labs}],\n`;
    out += `  nav:     '${nav}',\n`;
    out += `});\n\n`;
  });

  downloadFile(filename, out);
  showToast('Pobrano ' + filename, false, true);
});

// -- Reset form to empty state --

function resetForm() {
  editingIndex             = null;
  titleInput.value         = '';
  coordsInput.value        = '';
  districtDisplay.value    = '';
  districtDisplay.disabled = true;
  detailsEl.value          = '';
  setCounter(0);
  imgFileInput.value       = '';
  setImage('');
  tags.length = 0;
  tagsWrap.querySelectorAll('.tag').forEach(el => el.remove());
  cuisineSelect.value = 'EU';
  updateSwatch();

  if (mode === 'edit') {
    addBtn.innerHTML = SVG_PEN + ' Zaktualizuj';
    addBtn.classList.add('bar-btn-disabled');
  } else {
    addBtn.innerHTML = SVG_PLUS + ' Dodaj do listy';
    addBtn.classList.remove('bar-btn-disabled');
  }
  updatePreview();
}

// -- Init --
renderQueue();
updatePreview();

</script>
</body>
</html>
